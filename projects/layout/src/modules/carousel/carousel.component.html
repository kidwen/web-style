@if(showPrevArrow){
<button
    mat-mini-fab
    tabindex="-1"
    aria-hidden="true"
    aria-label="next"
    class="docs-carousel-nav docs-carousel-nav-prev"
    (click)="previous()"
>
    <mat-icon>navigate_before</mat-icon>
</button>
}

<section class="docs-carousel-content-wrapper">
    <div class="docs-carousel-content" #list>
        <ng-content></ng-content>
    </div>
</section>

@if(showNextArrow) {
<button
    mat-mini-fab
    tabindex="-1"
    aria-hidden="true"
    aria-label="next"
    class="docs-carousel-nav docs-carousel-nav-next"
    (click)="next()"
>
    <mat-icon>navigate_next</mat-icon>
</button>
}
