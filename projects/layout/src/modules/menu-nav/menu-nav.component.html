<div class="view-nav">
    <div class="nav-content">
        <mat-nav-list>
            @for (link of links; track link) {
                <a
                    mat-list-item
                    [routerLink]="link.routerLink"
                    [routerLinkActive]="['selected']"
                    (click)="menuClick(link.text || '')"
                >
                    {{ link.text }}
                </a>
            }
        </mat-nav-list>
    </div>
</div>
