<nav class="doc-navbar-header">
    @for (link of links; track link) {
        <a mat-button [routerLink]="link?.routerLink">
            {{ link?.text }}
        </a>
    }
</nav>
<div class="doc-buttons">
    <mat-icon
        aria-hidden="false"
        [fontIcon]="theme"
        (click)="switchTheme()"
    ></mat-icon>
</div>
